---
- name: UBUNTU SERVER UPDATE
  hosts: all
  become: yes
  vars:
    # Tên tài khoản bàn giao cho dự án (Lấy từ Survey của Semaphore)
    target_user: "{{ username_du_an }}"
    # Mật khẩu mặc định cấp cho dự án (Lấy từ Survey)
    target_pass: "{{ password_du_an }}"
  
  tasks:
  
    - name: 1 - Tao tai khoan cho Du an, set Password va Tu sinh SSH Key
      user:
        name: "{{ target_user }}"
        password: "{{ target_pass | password_hash('sha512') }}"
        shell: /bin/bash
        create_home: yes
        generate_ssh_key: yes
        ssh_key_bits: 4096
        ssh_key_file: .ssh/id_rsa
        groups: sudo
        append: yes
        state: present

    - name: 2 - Doc noi dung Public Key vua duoc tao tren Server
      slurp:
        src: "/home/{{ target_user }}/.ssh/id_rsa.pub"
      register: generated_pub_key

    - name: 3 - Ghi Public Key vao file authorized_keys de user co the dung Private key dang nhap
      authorized_key:
        user: "{{ target_user }}"
        state: present
        key: "{{ generated_pub_key['content'] | b64decode }}"

    - name: 4 - Cap nhat danh sach goi (apt update & upgrade)
      apt:
        update_cache: yes
        upgrade: dist

# ============== Pastbolt ================
    - name: 5 - Doc noi dung Private Key vua tao vao bo nho tam
      slurp:
        src: "/home/{{ target_user }}/.ssh/id_rsa"
      register: pkey_slurp

    - name: 2.6 -[Semaphore Server] Ghi Passbolt GPG Key ra file an (Giai ma Base64)
      copy:
        content: "{{ passbolt_gpg_key | trim | b64decode }}" # <--- Giai ma chuoi Base64 tro lai thanh file chuan
        dest: "/tmp/passbolt_ansible_gpg.asc"
        mode: '0600'
      delegate_to: localhost
      connection: local
      become: false
        

    - name: 2.7 - [Semaphore Server] Tao Secret tren Passbolt va Share cho User
      shell: |
        set -e # Dung script ngay neu co loi
        
        # =======================================================
        # BUOC A: Tao Resource tren Passbolt
        # =======================================================
        RESOURCE_JSON=$(passbolt create resource \
          --serverAddress "{{ passbolt_url }}" \
          --userPrivateKeyFile "/tmp/passbolt_ansible_gpg.asc" \
          --userPassword "{{ passbolt_passphrase }}" \
          --name "[SSH Key] Server {{ inventory_hostname }}" \
          --uri "{{ inventory_hostname }}" \
          --username "{{ target_user }}" \
          --password "{{ pkey_slurp.content | b64decode }}" \
          --json)
        
        # Trich xuat ID cua Resource (Secret) bang jq
        RESOURCE_ID=$(echo "$RESOURCE_JSON" | jq -r '.id')
        
        # FIX LỖI: Đã thêm dấu cách giữa if và [
        if [ -z "$RESOURCE_ID" ] ||[ "$RESOURCE_ID" == "null" ]; then
            echo "Loi: Khong lay duoc Resource ID tu Passbolt"
            exit 1
        fi
        
        # =======================================================
        # BUOC B: Tim User ID dua tren Email
        # =======================================================
        # Lay danh sach User duoi dang JSON
        USERS_JSON=$(passbolt list users \
          --serverAddress "{{ passbolt_url }}" \
          --userPrivateKeyFile "/tmp/passbolt_ansible_gpg.asc" \
          --userPassword "{{ passbolt_passphrase }}" \
          --json)
          
        # Dung jq de tim ra user co username (email) khop voi o Survey, sau do lay id
        USER_ID=$(echo "$USERS_JSON" | jq -r --arg email "{{ passbolt_share_email }}" '.[] | select(.username == $email) | .id')
        
        # FIX LỖI: Đã thêm dấu cách giữa if và [
        if [ -z "$USER_ID" ] ||[ "$USER_ID" == "null" ]; then
            echo "Loi: Khong tim thay User ID cho email {{ passbolt_share_email }}. Vui long kiem tra lai."
            exit 1
        fi

        # =======================================================
        # BUOC C: Share Resource cho User ID (Quyen Read = type 1)
        # =======================================================
        passbolt share resource \
          --id "$RESOURCE_ID" \
          --serverAddress "{{ passbolt_url }}" \
          --userPrivateKeyFile "/tmp/passbolt_ansible_gpg.asc" \
          --userPassword "{{ passbolt_passphrase }}" \
          --user "$USER_ID" \
          --type 1
          
      args:
        executable: /bin/bash
      delegate_to: localhost
      connection: local
      become: false
      no_log: true  # <--- BẢO MẬT TUYỆT ĐỐI: KHÓA MÕM ANSIBLE
          
      
    - name: 8 - [Semaphore Server] Xoa file GPG Key de don dep dau vet
      file:
        path: "/tmp/passbolt_ansible_gpg.asc"
        state: absent
      delegate_to: localhost
      connection: local
      become: false
