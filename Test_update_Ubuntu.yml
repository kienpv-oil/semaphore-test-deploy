---
- name: UBUNTU SERVER UPDATE
  hosts: all
  become: yes
  vars:
    # Tên tài khoản bàn giao cho dự án (Lấy từ Survey của Semaphore)
    target_user: "{{ username_du_an }}"
    # Mật khẩu mặc định cấp cho dự án (Lấy từ Survey)
    target_pass: "{{ password_du_an }}"
  
  tasks:
  
    - name: 1 - Tao tai khoan cho Du an, set Password va Tu sinh SSH Key
      user:
        name: "{{ target_user }}"
        password: "{{ target_pass | password_hash('sha512') }}"
        shell: /bin/bash
        create_home: yes
        generate_ssh_key: yes
        ssh_key_bits: 4096
        ssh_key_file: .ssh/id_rsa
        groups: sudo
        append: yes
        state: present

    - name: 2 - Doc noi dung Public Key vua duoc tao tren Server
      slurp:
        src: "/home/{{ target_user }}/.ssh/id_rsa.pub"
      register: generated_pub_key

    - name: 3 - Ghi Public Key vao file authorized_keys de user co the dung Private key dang nhap
      authorized_key:
        user: "{{ target_user }}"
        state: present
        key: "{{ generated_pub_key['content'] | b64decode }}"

    - name: 4 - Cap nhat danh sach goi (apt update & upgrade)
      apt:
        update_cache: yes
        upgrade: dist

# ============== Pastbolt ================
    - name: 5 - Doc noi dung Private Key vua tao vao bo nho tam
      slurp:
        src: "/home/{{ target_user }}/.ssh/id_rsa"
      register: pkey_slurp

    - name: 2.6 -[Semaphore Server] Ghi Passbolt GPG Key ra file an (Giai ma Base64)
      copy:
        content: "{{ passbolt_gpg_key | b64decode }}" # <--- Giai ma chuoi Base64 tro lai thanh file chuan
        dest: "/tmp/passbolt_ansible_gpg.asc"
        mode: '0600'
      delegate_to: localhost
      connection: local
      become: false
#      no_log: true  # <--- Giau khong cho in Base64 ra log

    - name: 2.7 - [Semaphore Server] Tao Secret tren Passbolt va Share cho User
      shell: |
        set -e # Dung script ngay neu co loi
        
        echo "1. Dang tao Secret tren Passbolt..."
        RESOURCE_JSON=$(passbolt create resource \
          --name "[SSH Key] Server {{ inventory_hostname }}" \
          --uri "{{ inventory_hostname }}" \
          --username "{{ target_user }}" \
          --password "{{ pkey_slurp.content | b64decode }}" \
          --json)
        
        echo "2. Trich xuat ID cua Secret..."
        RESOURCE_ID=$(echo "$RESOURCE_JSON" | jq -r '.id')
        
        if[ -z "$RESOURCE_ID" ] || [ "$RESOURCE_ID" == "null" ]; then
            echo "LOI: Tao Secret that bai. API tra ve:"
            echo "$RESOURCE_JSON"
            exit 1
        fi
        
        echo "Tao thanh cong! ID: $RESOURCE_ID"
        echo "3. Dang Share cho User {{ passbolt_share_email }}..."
        
        # Su dung type 1 (Quyen Read)
        passbolt share resource \
          --id "$RESOURCE_ID" \
          --user "{{ passbolt_share_email }}" \
          --type 1
          
      environment:
        # Passbolt CLI se doc cac bien nay ngam o duoi, KHONG IN RA LOG
        PASSBOLT_SERVER_ADDRESS: "{{ passbolt_url }}"
        PASSBOLT_USER_PRIVATE_KEY_FILE: "/tmp/passbolt_ansible_gpg.asc"
        PASSBOLT_USER_PASSWORD: "{{ passbolt_passphrase }}"
      delegate_to: localhost
      connection: local
      become: false
      
    - name: 8 - [Semaphore Server] Xoa file GPG Key de don dep dau vet
      file:
        path: "/tmp/passbolt_ansible_gpg.asc"
        state: absent
      delegate_to: localhost
      connection: local
      become: false
