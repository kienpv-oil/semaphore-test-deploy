---
- name: UBUNTU SERVER HARDENING & OPTIMIZATION
  hosts: all
  become: yes

  vars:
    # Tên tài khoản bàn giao cho dự án (Lấy từ Survey của Semaphore)
    target_user: "{{ username_du_an }}"
    # Mật khẩu mặc định cấp cho dự án (Lấy từ Survey)
    target_pass: "{{ password_du_an }}"

  tasks:

    # =========================================================
    # 1. CẬP NHẬT HỆ THỐNG & TỰ ĐỘNG BẢO MẬT (Giữ nguyên)
    # =========================================================
    - name: 1.1 - Cap nhat danh sach goi (apt update & upgrade)
      apt:
        update_cache: yes
        upgrade: dist

    - name: 1.2 - Cai dat Unattended-Upgrades
      apt:
        name: unattended-upgrades
        state: present

    - name: 1.3 - Kich hoat tu dong cap nhat bao mat
      copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";
        owner: root
        group: root
        mode: '0644'


    # =========================================================
    # 2. CẤU HÌNH TÀI KHOẢN & TỰ ĐỘNG SINH SSH KEY CHO DỰ ÁN
    # =========================================================
    - name: 2.1 - Tao tai khoan cho Du an, set Password va Tu sinh SSH Key
      user:
        name: "{{ target_user }}"
        password: "{{ target_pass | password_hash('sha512') }}"
        shell: /bin/bash
        create_home: yes
        generate_ssh_key: yes
        ssh_key_bits: 4096
        ssh_key_file: .ssh/id_rsa
        groups: sudo
        append: yes
        state: present

    - name: 2.2 - Doc noi dung Public Key vua duoc tao tren Server
      slurp:
        src: "/home/{{ target_user }}/.ssh/id_rsa.pub"
      register: generated_pub_key

    - name: 2.3 - Ghi Public Key vao file authorized_keys de user co the dung Private key dang nhap
      authorized_key:
        user: "{{ target_user }}"
        state: present
        key: "{{ generated_pub_key['content'] | b64decode }}"

    - name: 2.4 - Cap nhat danh sach goi (apt update & upgrade)
      apt:
        update_cache: yes
        upgrade: dist

    # ========================================== Pastbolt ==========================================================
    - name: 2.5 - Doc noi dung Private Key vua tao vao bo nho tam
      slurp:
        src: "/home/{{ target_user }}/.ssh/id_rsa"
      register: pkey_slurp

    - name: 2.6 -[Semaphore Server] Ghi Passbolt GPG Key ra file an (Giai ma Base64)
      copy:
        content: "{{ passbolt_gpg_key | trim | b64decode }}" # <--- Giai ma chuoi Base64 tro lai thanh file chuan
        dest: "/tmp/passbolt_ansible_gpg.asc"
        mode: '0600'
      delegate_to: localhost
      connection: local
      become: false
        

    - name: 2.7 - [Semaphore Server] Tao Secret tren Passbolt va Share cho User
      shell: |
        set -e # Dung script ngay neu co loi
        
        # =======================================================
        # BUOC A: Tao Resource tren Passbolt
        # =======================================================
        RESOURCE_JSON=$(passbolt create resource \
          --serverAddress "{{ passbolt_url }}" \
          --userPrivateKeyFile "/tmp/passbolt_ansible_gpg.asc" \
          --userPassword "{{ passbolt_passphrase }}" \
          --name "[SSH Key] Server {{ inventory_hostname }}" \
          --uri "{{ inventory_hostname }}" \
          --username "{{ target_user }}" \
          --password "{{ pkey_slurp.content | b64decode }}" \
          --json)
        
        # Trich xuat ID cua Resource (Secret) bang jq
        RESOURCE_ID=$(echo "$RESOURCE_JSON" | jq -r '.id')
        
        # FIX LỖI: Đã thêm dấu cách giữa if và [
        if [ -z "$RESOURCE_ID" ] ||[ "$RESOURCE_ID" == "null" ]; then
            echo "Loi: Khong lay duoc Resource ID tu Passbolt"
            exit 1
        fi
        
        # =======================================================
        # BUOC B: Tim User ID dua tren Email
        # =======================================================
        # Lay danh sach User duoi dang JSON
        USERS_JSON=$(passbolt list users \
          --serverAddress "{{ passbolt_url }}" \
          --userPrivateKeyFile "/tmp/passbolt_ansible_gpg.asc" \
          --userPassword "{{ passbolt_passphrase }}" \
          --json)
          
        # Dung jq de tim ra user co username (email) khop voi o Survey, sau do lay id
        USER_ID=$(echo "$USERS_JSON" | jq -r --arg email "{{ passbolt_share_email }}" '.[] | select(.username == $email) | .id')
        
        # FIX LỖI: Đã thêm dấu cách giữa if và [
        if [ -z "$USER_ID" ] ||[ "$USER_ID" == "null" ]; then
            echo "Loi: Khong tim thay User ID cho email {{ passbolt_share_email }}. Vui long kiem tra lai."
            exit 1
        fi

        # =======================================================
        # BUOC C: Share Resource cho User ID (Quyen Read = type 1)
        # =======================================================
        passbolt share resource \
          --id "$RESOURCE_ID" \
          --serverAddress "{{ passbolt_url }}" \
          --userPrivateKeyFile "/tmp/passbolt_ansible_gpg.asc" \
          --userPassword "{{ passbolt_passphrase }}" \
          --user "$USER_ID" \
          --type 1
          
      args:
        executable: /bin/bash
      delegate_to: localhost
      connection: local
      become: false
      no_log: true  # <--- Không hiện log để tránh lộ key
          
      
    - name: 2.8 - [Semaphore Server] Xoa file GPG Key de don dep dau vet
      file:
        path: "/tmp/passbolt_ansible_gpg.asc"
        state: absent
      delegate_to: localhost
      connection: local
      become: false


    # =========================================================
    # 3. CHỐNG DDOS (SYN FLOOD) & TỐI ƯU TCP/IP STACK (Giữ nguyên)
    # =========================================================
    - name: 3.1 - Cau hinh sysctl.conf cho Bao mat va Hieu suat High Traffic
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        sysctl_set: yes
        reload: yes
      loop:
        - { key: 'net.ipv4.tcp_syncookies', value: '1' }
        - { key: 'net.ipv4.tcp_max_syn_backlog', value: '2048' }
        - { key: 'net.ipv4.tcp_synack_retries', value: '2' }
        - { key: 'net.core.somaxconn', value: '65535' }
        - { key: 'net.core.netdev_max_backlog', value: '65535' }
        - { key: 'net.ipv4.tcp_tw_reuse', value: '1' }
        - { key: 'net.ipv4.ip_local_port_range', value: '1024 65535' }


    # =========================================================
    # 4. ĐỒNG BỘ THỜI GIAN VỚI CHRONY (Giữ nguyên)
    # =========================================================
    - name: 4.1 - Cai dat Chrony
      apt:
        name: chrony
        state: present

    - name: 4.2 - Kich hoat va Start Chrony service
      systemd:
        name: chrony
        enabled: yes
        state: started


    # =========================================================
    # 5. CÀI ĐẶT WAZUH AGENT (Giữ nguyên)
    # =========================================================
    - name: 5.1 - Tai file cai dat Wazuh Agent (.deb)
      get_url:
        url: https://packages.wazuh.com/4.x/apt/pool/main/w/wazuh-agent/wazuh-agent_4.13.1-1_amd64.deb
        dest: /tmp/wazuh-agent.deb

    - name: 5.2 - Cai dat Wazuh Agent voi tham so Environment
      shell: >
        WAZUH_MANAGER='10.0.1.66' WAZUH_AGENT_GROUP='Servers' dpkg -i /tmp/wazuh-agent.deb
      args:
        creates: /var/ossec/etc/ossec.conf 

    - name: 5.3 - Reload systemd, Enable va Start Wazuh
      systemd:
        name: wazuh-agent
        daemon_reload: yes
        enabled: yes
        state: started

    - name: 5.4 - Xoa file cai dat .deb de don dep
      file:
        path: /tmp/wazuh-agent.deb
        state: absent


  # =========================================================
  # HANDLERS
  # =========================================================
  handlers:
    - name: Restart SSH
      systemd:
        name: sshd
        state: restarted
