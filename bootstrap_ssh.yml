---
- name: "Bootstrap: Đẩy Public Key cho hàng loạt Server"
  hosts: all
  become: yes
  tasks:
    - name: "1. Đảm bảo thư mục .ssh tồn tại"
      file:
        path: "/home/it/.ssh"
        state: directory
        mode: '0700'
        owner: it
        group: it

    - name: "2. Đẩy Public Key vào file authorized_keys"
      authorized_key:
        user: it
        state: present
        key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHcS4c3/xeZnWKXckH2tRcECCW6Bm6aEgz7unJ5xzXDi kienpv@semaphore-server"
